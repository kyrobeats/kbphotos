<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #1a1a1a; 
            --gap: 15px; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px; 
        }

        header { 
            text-align: center; 
            margin-bottom: 60px; 
        }

        h1 { 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-size: 1.5rem; 
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-gap: var(--gap);
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
            background-color: #f0f0f0;
        }

        .gallery img:hover { 
            opacity: 0.9; 
            transform: scale(1.01);
        }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            align-items: center; 
            justify-content: center;
            cursor: zoom-out;
        }

        #lightbox img { 
            max-width: 90%; 
            max-height: 85vh; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            cursor: default;
        }
    </style>
</head>
<body>

<header>
    <h1>Portfolio</h1>
</header>

<div class="gallery">
    <a href="#img1">
        <img src="./image/IMG_0102.JPG" alt="Portfolio Image">
    </a>
</div>

<div id="lightbox" onclick="window.location.hash='#'">
    <img id="lightbox-img" src="" alt="Enlarged view">
</div>

<script>
    function handleLightbox() {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const hash = window.location.hash;

        if (hash === '#img1') {
            const clickedImg = document.querySelector('a[href="#img1"] img');
            if (clickedImg) {
                lightboxImg.src = clickedImg.src;
                lightbox.style.display = 'flex';
            }
        } else {
            lightbox.style.display = 'none';
        }
    }

    window.addEventListener('hashchange', handleLightbox);
    window.addEventListener('load', handleLightbox);
</script>

</body>
</html>
