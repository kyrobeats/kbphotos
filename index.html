<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB Photos | Portfolio</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #f0f0f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { text-align: center; margin-bottom: 40px; position: relative; min-height: 60px; }
        h1 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; font-size: 1.2rem; margin-top: 10px; }

        /* Back Button - Hidden by default */
        .back-btn {
            display: none;
            position: absolute;
            top: 10px; left: 0;
            background: none; border: 1px solid #ddd;
            padding: 8px 15px; cursor: pointer;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px;
        }
        .back-btn:hover { background: var(--accent); }

        /* Folder Grid */
        #folder-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 40px; max-width: 1000px; margin: 0 auto;
        }
        .folder { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .folder:hover { transform: translateY(-5px); }
        .folder-icon { 
            width: 100%; height: 150px; 
            background: var(--accent); 
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin-bottom: 10px;
            border-radius: 8px;
        }

        /* Image Gallery - Hidden by default */
        #gallery-view {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; max-width: 1200px; margin: 0 auto;
        }
        #gallery-view img { width: 100%; height: 300px; object-fit: cover; cursor: pointer; }

        /* Lightbox */
        #lightbox {
            display: none; position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            align-items: center; justify-content: center;
        }
        #lightbox img { max-width: 90%; max-height: 85vh; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" id="backBtn" onclick="goHome()">← Back</button>
    <h1>KB Photos</h1>
</header>

<div id="folder-view">
    <div class="folder" onclick="openFolder('collection1')">
        <div class="folder-icon">📁</div>
        <p>Featured Photos</p>
    </div>
    </div>

<div id="gallery-view">
    <img src="./image/IMG_0102.JPG" class="collection1" onclick="openLightbox(this.src)">
    </div>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
</div>

<script>
    const folderView = document.getElementById('folder-view');
    const galleryView = document.getElementById('gallery-view');
    const backBtn = document.getElementById('backBtn');
    const galleryImages = document.querySelectorAll('#gallery-view img');

    function openFolder(folderName) {
        // Hide folders, show gallery and back button
        folderView.style.display = 'none';
        galleryView.style.display = 'grid';
        backBtn.style.display = 'block';

        // Hide all images first, then only show ones matching the folder name
        galleryImages.forEach(img => {
            if (img.classList.contains(folderName)) {
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        });
    }

    function goHome() {
        // Show folders, hide gallery and back button
        folderView.style.display = 'grid';
        galleryView.style.display = 'none';
        backBtn.style.display = 'none';
    }

    function openLightbox(src) {
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        lbImg.src = src;
        lb.style.display = 'flex';
    }
</script>

</body>
</html>
